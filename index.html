<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>Vedant Tapase | AIML Engineer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none; border: none; outline: none; font-family: 'Poppins', sans-serif; }
        :root { --bg-color: #080808; --second-bg-color: #131313; --main-color: #b74b4b; --white: #ffffff; }
        html { font-size: 62.5%; scroll-behavior: smooth; }
        body { background: var(--bg-color); color: var(--white); overflow-x: hidden; }

        /* --- ENTRANCE --- */
        .slash-container { position: fixed; top: 50%; left: 0; width: 100%; height: 4px; background: var(--main-color); z-index: 10000; box-shadow: 0 0 20px var(--main-color); animation: slashMove 1.5s ease-out forwards; }
        @keyframes slashMove { 0% { width: 0; opacity: 1; } 70% { width: 100%; opacity: 1; height: 4px; } 100% { width: 100%; opacity: 0; height: 0; } }

        /* --- HERO --- */
        section { min-height: 100vh; padding: 10rem 10% 2rem; opacity: 0; animation: fadeIn 1.5s ease-in 1.2s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        .home { display: flex; justify-content: center; align-items: center; gap: 8rem; }
        .home-content h1 { font-size: 6.5rem; font-weight: 700; }
        .home-content span { color: var(--main-color); }
        .home-content h3 { font-size: 3.5rem; margin: 1rem 0; }
        .home-content p { font-size: 1.6rem; color: #ccc; margin-bottom: 3rem; }

        /* --- IMAGES (FIXED) --- */
        .home-img { position: relative; animation: float 4s ease-in-out infinite; }
        .home-img img:first-child { width: 32vw; border-radius: 50%; border: 4px solid var(--main-color); box-shadow: 0 0 25px var(--main-color); }
        
        /* This is the Oden Icon */
        .oden-icon { 
            position: absolute; 
            bottom: -10px; 
            right: 0px; 
            width: 80px !important; 
            z-index: 5; 
            filter: drop-shadow(0 0 10px var(--main-color)); 
            display: block !important;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- SOCIALS --- */
        .social-icons a { display: inline-flex; justify-content: center; align-items: center; width: 4.5rem; height: 4.5rem; border: 0.2rem solid var(--main-color); font-size: 2.2rem; border-radius: 50%; color: var(--main-color); margin-right: 1.5rem; transition: 0.3s; }
        .social-icons a:hover { background: var(--main-color); color: black; transform: translateY(-5px); }

        /* --- TYPING --- */
        .typing-text span::before { content: ""; color: var(--main-color); animation: words 10s infinite; }
        @keyframes words { 0%, 50% { content: "AIML Engineer"; } 51%, 100% { content: "AI Specialist"; } }

        /* --- MOBILE FIX --- */
        @media (max-width: 991px) {
            .home { flex-direction: column-reverse; text-align: center; }
            .home-img img:first-child { width: 60vw; }
            .home-content h1 { font-size: 4.5rem; }
            .oden-icon { width: 60px !important; bottom: -5px; right: 5%; }
        }
    </style>
</head>
<body>
    <div class="slash-container"></div>
    <section class="home" id="home">
        <div class="home-content">
            <h1>Hi, It's <span>Vedant Tapase</span></h1>
            <h3 class="typing-text">I'm an <span></span></h3>
            <p>I am a passionate AIML engineer focused on building intelligent systems. Currently pursuing FY B.Tech CSE AIML.</p>
            <div class="social-icons">
                <a href="mailto:vedanttapase70@gmail.com"><i class="fa-solid fa-envelope"></i></a>
                <a href="https://www.linkedin.com/in/vedant-tapase-ab3239396" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://github.com/vedanttapase" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="https://x.com/spxoden" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="https://www.instagram.com/ved.rt14" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
        <div class="home-img">
            <img src="main.jpg" alt="Vedant">
            <img src="https://img.icons8.com/color/144/one-piece.png" class="oden-icon" alt="Oden Spirit">
        </div>
    </section>
</body>
</html>
